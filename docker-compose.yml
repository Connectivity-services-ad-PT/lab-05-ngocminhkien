version: "3.8"

services:
  # 1. Cơ sở dữ liệu TimescaleDB
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: fit4110-db-lab05
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-analytics_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-super_secret_password}
      POSTGRES_DB: ${POSTGRES_DB:-analytics_db}
    ports:
      - "5432:5432"
    networks:
      - team-internal
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 2. Dịch vụ API Backend
  api:
    build:
      context: .
    container_name: fit4110-api-lab05
    env_file:
      - .env
    environment:
      DB_HOST: db  # Trỏ mạng nội bộ về container db
    ports:
      - "${APP_PORT:-8000}:8000"
    networks:
      - team-internal
    depends_on:
      db:
        condition: service_healthy

  # 3. Dịch vụ Worker xử lý dữ liệu ảo
  data-worker:
    image: python:3.11-slim
    container_name: fit4110-worker-lab05
    command: ["sh", "-c", "while true; do echo 'Worker đang chờ nhiệm vụ...'; sleep 60; done"]
    networks:
      - team-internal

networks:
  team-internal:
    driver: bridge

volumes:
  db-data: